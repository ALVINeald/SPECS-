<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPECS – Main</title>
  <style>
    /* ── CSS VARIABLES (shared SPECS design tokens) ── */
    :root {
      --forest : #18382a;
      --leaf   : #52b788;
      --gold   : #e9a820;
      --amber  : #f4a261;
      --red    : #e63946;
      --muted  : #7a7060;
      --bg     : #f5f1eb;
      --card   : #ffffff;
      --border : #e8e2d9;
    }

    /* ── TOAST CONTAINER & ANIMATIONS ── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      padding: 12px 20px;
      border-radius: 10px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: #fff;
      max-width: 340px;
      box-shadow: 0 4px 18px rgba(0,0,0,.18);
      animation: toastIn .3s ease;
      pointer-events: auto;
    }
    .toast-success { background: var(--leaf); }
    .toast-error   { background: var(--red); }
    .toast-warning { background: var(--amber); }
    .toast-default { background: var(--forest); }

    @keyframes toastIn  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { from { opacity:1; } to { opacity:0; transform:translateY(8px); } }

    /* ── PASSWORD STRENGTH BAR ── */
    .strength-bar {
      height: 5px;
      border-radius: 3px;
      background: #ccc;
      transition: width .3s, background .3s;
      width: 0%;
    }

    /* ── SEARCH RESULTS DROPDOWN ── */
    .search-results {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,.1);
      z-index: 500;
      max-height: 320px;
      overflow-y: auto;
    }

    .search-result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      cursor: pointer;
      transition: background .15s;
      border-bottom: 1px solid var(--border);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #f5f1eb; }

    .search-result-name  { font-weight: 600; font-size: 0.88rem; color: var(--forest); }
    .search-result-price { font-size: 0.8rem; color: var(--muted); }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 8000;
      align-items: center;
      justify-content: center;
    }

    /* ── FLASH ALERTS ── */
    .alert {
      padding: 12px 18px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 0.88rem;
      font-weight: 600;
    }

    /* ── MOBILE NAV ── */
    #mobile-nav {
      display: none;
    }
    #mobile-nav.open {
      display: block;
    }
  </style>
</head>
<body>

<script>
/* ============================================================
   SPECS – Main JavaScript
   File: assets/js/main.js
   Used by: ALL pages via header.php
   ============================================================ */

/* ── TOAST NOTIFICATIONS ──────────────────────────────────── */
function showToast(message, type = 'default', duration = 3500) {
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }

  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  container.appendChild(toast);

  setTimeout(() => {
    toast.style.animation = 'toastOut .3s ease forwards';
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

/* ── BASKET COUNTER ───────────────────────────────────────── */
function updateBasketCount() {
  fetch('../api/add_to_basket.php', { method: 'GET' })
    .catch(() => {});
}

function addToBasketAjax(productId, quantity = 1, buttonEl = null) {
  const formData = new FormData();
  formData.append('product_id', productId);
  formData.append('quantity', quantity);

  if (buttonEl) {
    buttonEl.disabled = true;
    buttonEl.textContent = '⏳ Adding...';
  }

  fetch('../api/add_to_basket.php', { method: 'POST', body: formData })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        showToast(`✅ ${data.product_name} added to basket!`, 'success');

        // Update badge
        const badge = document.getElementById('basket-badge');
        if (badge) {
          badge.textContent = data.basket_count;
          badge.style.display = data.basket_count > 0 ? 'flex' : 'none';
        }

        if (buttonEl) {
          buttonEl.textContent = '✅ In Basket';
          buttonEl.style.background = 'var(--leaf)';
        }
      } else {
        showToast(data.message || 'Could not add to basket', 'error');
        if (buttonEl) {
          buttonEl.disabled = false;
          buttonEl.textContent = '🛒 Add to Basket';
        }
      }
    })
    .catch(() => {
      showToast('Network error. Please try again.', 'error');
      if (buttonEl) {
        buttonEl.disabled = false;
        buttonEl.textContent = '🛒 Add to Basket';
      }
    });
}

/* ── MODAL HELPERS ────────────────────────────────────────── */
function openModal(id) {
  const modal = document.getElementById(id);
  if (modal) {
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
}

function closeModal(id) {
  const modal = document.getElementById(id);
  if (modal) {
    modal.style.display = 'none';
    document.body.style.overflow = '';
  }
}

// Close modal when clicking outside
document.addEventListener('click', function (e) {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.style.display = 'none';
    document.body.style.overflow = '';
  }
});

// Close modal with Escape key
document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay').forEach(m => {
      m.style.display = 'none';
    });
    document.body.style.overflow = '';
  }
});

/* ── CONFIRM DIALOGS ──────────────────────────────────────── */
function confirmAction(message, callback) {
  if (window.confirm(message)) callback();
}

/* ── PASSWORD TOGGLE ──────────────────────────────────────── */
function togglePassword(inputId, btnEl) {
  const input = document.getElementById(inputId);
  if (!input) return;
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  if (btnEl) btnEl.textContent = isHidden ? '🙈' : '👁️';
}

/* ── PASSWORD STRENGTH METER ──────────────────────────────── */
function checkPasswordStrength(password, barId, hintId) {
  const bar  = document.getElementById(barId);
  const hint = document.getElementById(hintId);
  if (!bar || !hint) return;

  let score = 0;
  if (password.length >= 6)           score++;
  if (password.length >= 10)          score++;
  if (/[A-Z]/.test(password))         score++;
  if (/[0-9]/.test(password))         score++;
  if (/[^A-Za-z0-9]/.test(password))  score++;

  const levels = [
    { w: '0%',   c: '#ccc',         t: 'Too short'  },
    { w: '25%',  c: 'var(--red)',   t: 'Weak'       },
    { w: '50%',  c: 'var(--amber)', t: 'Fair'       },
    { w: '75%',  c: 'var(--gold)',  t: 'Good'       },
    { w: '100%', c: 'var(--leaf)',  t: 'Strong ✅'  },
  ];

  const level = levels[Math.min(score, 4)];
  bar.style.width      = level.w;
  bar.style.background = level.c;
  hint.textContent     = level.t;
  hint.style.color     = level.c;
}

/* ── SEARCH WITH DEBOUNCE ─────────────────────────────────── */
function debounce(fn, delay = 350) {
  let timer;
  return function (...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}

const liveSearch = debounce(function (inputEl, resultsId, endpoint) {
  const q = inputEl.value.trim();
  const results = document.getElementById(resultsId);
  if (!results) return;

  if (q.length < 2) {
    results.style.display = 'none';
    return;
  }

  fetch(`${endpoint}?q=${encodeURIComponent(q)}`)
    .then(r => r.json())
    .then(data => {
      if (!data.products || !data.products.length) {
        results.style.display = 'none';
        return;
      }

      results.innerHTML = data.products.slice(0, 8).map(p => `
        <div class="search-result-item" onclick="selectProduct(${p.id}, '${escapeHtml(p.name)}')">
          <span class="search-result-name">${escapeHtml(p.name)}</span>
          <span class="search-result-price">UGX ${parseInt(p.min_price).toLocaleString()}</span>
        </div>
      `).join('');
      results.style.display = 'block';
    })
    .catch(() => {});
});

/* ── COPY TO CLIPBOARD ────────────────────────────────────── */
function copyToClipboard(text, successMsg = 'Copied!') {
  navigator.clipboard.writeText(text)
    .then(() => showToast(successMsg, 'success'))
    .catch(() => showToast('Could not copy', 'error'));
}

/* ── FORMAT CURRENCY ──────────────────────────────────────── */
function formatUGX(amount) {
  return 'UGX ' + parseInt(amount).toLocaleString();
}

/* ── ESCAPE HTML ──────────────────────────────────────────── */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

/* ── PRINT RECEIPT ────────────────────────────────────────── */
function printReceipt(elementId) {
  const el = document.getElementById(elementId);
  if (!el) return;
  const w = window.open('', '_blank');
  w.document.write(`
    <html>
      <head>
        <title>SPECS Shopping Plan</title>
        <style>
          body { font-family: 'Nunito Sans', sans-serif; padding: 20px; background: #18382a; color: #fff; }
          * { box-sizing: border-box; }
        </style>
      </head>
      <body>${el.innerHTML}</body>
    </html>
  `);
  w.document.close();
  w.focus();
  w.print();
}

/* ── SHARE PLAN ───────────────────────────────────────────── */
function sharePlan(planRef, storeName, total) {
  const text = `🛒 My SPECS Shopping Plan\nRef: ${planRef}\nStore: ${storeName}\nTotal: UGX ${parseInt(total).toLocaleString()}\n\nBuilt with SPECS – Mbarara City`;
  if (navigator.share) {
    navigator.share({ title: 'SPECS Shopping Plan', text });
  } else {
    copyToClipboard(planRef, '📋 Plan reference copied!');
  }
}

/* ── ACTIVE NAV LINK ──────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', function () {
  const path = window.location.pathname;
  document.querySelectorAll('.nav-link').forEach(link => {
    if (link.getAttribute('href') && path.includes(link.getAttribute('href').replace('../', ''))) {
      link.classList.add('active');
    }
  });
});

/* ── AUTO DISMISS FLASH ALERTS ────────────────────────────── */
document.addEventListener('DOMContentLoaded', function () {
  const alerts = document.querySelectorAll('.alert');
  alerts.forEach(alert => {
    setTimeout(() => {
      alert.style.transition = 'opacity .5s';
      alert.style.opacity    = '0';
      setTimeout(() => alert.remove(), 500);
    }, 5000);
  });
});

/* ── PRICE INPUT FORMATTER ────────────────────────────────── */
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('input[data-format="currency"]').forEach(input => {
    input.addEventListener('input', function () {
      const raw = this.value.replace(/[^0-9]/g, '');
      this.value = raw;
    });
  });
});

/* ── CONFIRM FORM SUBMITS ─────────────────────────────────── */
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('[data-confirm]').forEach(el => {
    el.addEventListener('click', function (e) {
      if (!window.confirm(this.dataset.confirm)) {
        e.preventDefault();
        e.stopPropagation();
      }
    });
  });
});

/* ── MOBILE NAV TOGGLE ────────────────────────────────────── */
function toggleMobileNav() {
  const nav = document.getElementById('mobile-nav');
  if (nav) nav.classList.toggle('open');
}
</script>
</body>
</html>
